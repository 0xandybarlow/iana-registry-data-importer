name: Release Library

on:
  push:
    tags:
      - 'iana-registry-data-lib@*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - name: Install
        run: npm ci
      - name: Build library
        run: npm run build:lib
      - name: Read package version
        id: package
        run: |
          version=$(node -e 'process.stdout.write(require("./iana-registry-data-lib/package.json").version)')
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Skip if version already exists on npm
        id: published
        run: |
          if npm view "iana-registry-data-lib@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        if: steps.published.outputs.skip != 'true'
        run: cd iana-registry-data-lib && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTOMATION_TOKEN }}
